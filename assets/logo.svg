<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="신장질환을 이긴 고양이 케어">
  <defs>
    <linearGradient id="catGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14857a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8c69"/>
      <stop offset="1" stop-color="#f4795b"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: rounded badge -->
  <g transform="translate(8,12)">
    <rect x="0" y="0" width="96" height="96" rx="30" fill="#fdf6ee"/>
    <rect x="0" y="0" width="96" height="96" rx="30" fill="none" stroke="#0f766e" stroke-opacity="0.12" stroke-width="2"/>

    <!-- Cat head (rounded, warm) -->
    <g transform="translate(48,52)">
      <!-- ears -->
      <path d="M-26,-16 C-30,-34 -20,-38 -12,-26 C-20,-24 -24,-20 -26,-16 Z" fill="url(#catGrad)"/>
      <path d="M26,-16 C30,-34 20,-38 12,-26 C20,-24 24,-20 26,-16 Z" fill="url(#catGrad)"/>
      <!-- face -->
      <ellipse cx="0" cy="2" rx="28" ry="25" fill="url(#catGrad)"/>
      <!-- eyes -->
      <circle cx="-10" cy="-2" r="3.4" fill="#fdf6ee"/>
      <circle cx="10" cy="-2" r="3.4" fill="#fdf6ee"/>
      <!-- nose -->
      <path d="M-3,7 L3,7 L0,11 Z" fill="#ff8c69"/>
      <!-- whiskers -->
      <g stroke="#fdf6ee" stroke-width="1.6" stroke-linecap="round" opacity="0.85">
        <path d="M-12,9 L-26,6"/>
        <path d="M-12,12 L-26,13"/>
        <path d="M12,9 L26,6"/>
        <path d="M12,12 L26,13"/>
      </g>
    </g>

    <!-- Care heart with cross, bottom-right -->
    <g transform="translate(70,68)">
      <path d="M0,6 C-6,-4 -20,-1 -16,9 C-13,16 0,24 0,24 C0,24 13,16 16,9 C20,-1 6,-4 0,6 Z" fill="url(#heartGrad)"/>
      <g stroke="#fdf6ee" stroke-width="2.6" stroke-linecap="round">
        <path d="M0,7 L0,15"/>
        <path d="M-4,11 L4,11"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(124,0)">
    <text x="0" y="52" font-family="'Noto Sans KR','Apple SD Gothic Neo',sans-serif" font-size="27" font-weight="800" fill="#0f766e" letter-spacing="-0.5">신장질환을 이긴</text>
    <text x="0" y="85" font-family="'Noto Sans KR','Apple SD Gothic Neo',sans-serif" font-size="27" font-weight="800" fill="#0f766e" letter-spacing="-0.5">고양이 <tspan fill="#f4795b">케어</tspan></text>
  </g>
</svg>

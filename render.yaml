services:
  - type: web
    name: sinego-care
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sinego-care-db
          property: connectionString
      - key: ADMIN_TOKEN
        sync: false

databases:
  - name: sinego-care-db
    plan: free
